<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- internal CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">


    <title>Color Flipper</title>
</head>
<body>
    <!-- notice -->
    <div id="notice">
        <i class="fas fa-exclamation-triangle"></i>
        <span class="text">Please open this website on screen sizes equals to or greater than 1024 pixels. We currently do not support low pixel screens e.g. Mobiles and Tablets.</span>
    </div>
    <header>
        <div id="logo">
            <span class="logo-txt">Color Flipper</span>
        </div>
        <div id="options">
            <span class="simple">Simple</span>
            <span class="hex">Hex</span>
        </div>
    </header>

    <!-- main section -->
    <main id="main-content">
        <h3>Background Color: <span class="dynamic-content">#FFFFFF</span></h3>
        <div id="buttons">
            <button type="button" class="click">CLICK ME</button>
            <button type="button" class="reset">RESET</button>
        </div>
    </main>

    <!-- internal JS -->
    <script src="./app.js"></script>
    <!-- font awesome script -->
    <script src="https://kit.fontawesome.com/2b8d837e91.js" crossorigin="anonymous"></script>
</body>
</html>
